{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>✨ Story Weaver · Create</title>
  <!-- Font Awesome 6 (free) for icons & subtle animation -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    /* ----- reset & base ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #f9f3e8 0%, #ffe9d4 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
      padding: 1.5rem;
      margin: 0;
    }

    /* ----- main card : floating + soft glow + animation ----- */
    .story-card {
      max-width: 700px;
      width: 100%;
      background: rgba(255, 250, 240, 0.75);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 48px 48px 40px 40px;
      padding: 2.2rem 2.5rem 2.8rem;
      box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.25),
                  0 0 0 1px rgba(255, 215, 175, 0.3) inset,
                  0 0 0 2px rgba(255, 245, 235, 0.7) inset;
      transition: all 0.25s ease;
      animation: floatIn 0.8s cubic-bezier(0.23, 1, 0.32, 1);
      border: 1px solid rgba(255, 225, 200, 0.5);
    }

    @keyframes floatIn {
      0% {
        opacity: 0;
        transform: translateY(40px) scale(0.96);
        box-shadow: 0 10px 30px -10px rgba(0,0,0,0.1);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
        box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.25);
      }
    }

    /* ----- header with icon & pulse animation ----- */
    .story-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 2rem;
      border-bottom: 2px dashed #e8d5c0;
      padding-bottom: 1.2rem;
    }

    .story-header i {
      font-size: 2.2rem;
      color: #c27f5a;
      animation: gentlePulse 2.8s infinite ease-in-out;
      filter: drop-shadow(0 4px 6px rgba(180, 110, 70, 0.2));
    }

    @keyframes gentlePulse {
      0% { transform: scale(1) rotate(0deg); }
      50% { transform: scale(1.08) rotate(3deg); color: #b46a40; }
      100% { transform: scale(1) rotate(0deg); }
    }

    .story-header h1 {
      font-weight: 600;
      font-size: 1.9rem;
      letter-spacing: -0.5px;
      color: #3d2c1e;
      background: linear-gradient(135deg, #5b3f2b, #8b5e3c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 2px 8px rgba(150, 90, 50, 0.1);
    }

    .story-header span {
      margin-left: auto;
      background: #dcc9b6;
      padding: 0.3rem 1rem;
      border-radius: 60px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #2f241b;
      letter-spacing: 0.3px;
      border: 1px solid #f3e0d0;
      box-shadow: 0 1px 4px rgba(0,0,0,0.02);
      animation: shimmerBadge 3s infinite;
    }

    @keyframes shimmerBadge {
      0% { background: #dcc9b6; }
      50% { background: #e8d6c4; box-shadow: 0 0 6px #dbaa88; }
      100% { background: #dcc9b6; }
    }

    /* ----- caption field (with icon) ----- */
    .caption-field {
      margin-bottom: 2rem;
      position: relative;
    }

    .caption-field label {
      display: block;
      font-weight: 500;
      color: #3b2b1d;
      font-size: 1rem;
      margin-bottom: 0.5rem;
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .caption-field label i {
      color: #ac7b5a;
      font-size: 1.2rem;
      width: 1.6rem;
      transition: transform 0.2s;
    }

    .caption-field label i:hover {
      transform: rotate(12deg) scale(1.1);
    }

    .caption-field input {
      width: 100%;
      padding: 1rem 1.4rem 1rem 3.2rem;
      border: 2px solid #e3cfbe;
      border-radius: 60px;
      background: rgba(255, 245, 235, 0.7);
      backdrop-filter: blur(4px);
      font-size: 1rem;
      font-weight: 400;
      color: #281f18;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(180, 130, 90, 0.05);
      outline: none;
    }

    .caption-field input:focus {
      border-color: #b8865f;
      background: #fffcf7;
      box-shadow: 0 8px 18px rgba(160, 100, 60, 0.15), 0 0 0 4px rgba(200, 150, 110, 0.15);
      transform: scale(1.01);
    }

    .caption-field .input-icon {
      position: absolute;
      left: 1.2rem;
      top: 2.8rem;
      color: #a87b5e;
      font-size: 1.2rem;
      pointer-events: none;
      transition: 0.2s;
    }

    .caption-field input:focus + .input-icon {
      color: #8b5e3c;
      transform: scale(1.1);
    }

    /* ----- image field (drag & drop vibe) ----- */
    .image-upload {
      margin-bottom: 2.4rem;
    }

    .image-upload label {
      display: block;
      font-weight: 500;
      color: #3b2b1d;
      margin-bottom: 0.7rem;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .image-upload label i {
      color: #ac7b5a;
      font-size: 1.2rem;
      transition: 0.2s;
    }

    .image-upload label i:hover {
      transform: scale(1.15) rotate(-4deg);
    }

    .drop-zone {
      background: rgba(245, 232, 220, 0.4);
      border: 2.5px dashed #cfb6a2;
      border-radius: 40px;
      padding: 2.2rem 1.5rem;
      text-align: center;
      transition: all 0.2s ease;
      cursor: pointer;
      backdrop-filter: blur(4px);
      box-shadow: 0 2px 10px rgba(150, 110, 70, 0.02);
      position: relative;
      overflow: hidden;
    }

    .drop-zone:hover {
      border-color: #b8865f;
      background: rgba(240, 220, 200, 0.5);
      transform: scale(1.005);
      box-shadow: 0 8px 22px rgba(160, 110, 70, 0.08);
    }

    .drop-zone i {
      font-size: 2.8rem;
      color: #b28462;
      margin-bottom: 0.8rem;
      display: block;
      transition: 0.25s;
    }

    .drop-zone:hover i {
      transform: translateY(-4px) scale(1.06);
      color: #9f6f4b;
    }

    .drop-zone p {
      font-size: 1rem;
      color: #4f3a2a;
      font-weight: 400;
      letter-spacing: 0.2px;
    }

    .drop-zone .file-hint {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-top: 0.2rem;
      color: #6b533f;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    /* file name preview (animation) */
    .file-preview {
      margin-top: 0.8rem;
      font-size: 0.9rem;
      color: #4b3728;
      background: #ebdbcc;
      padding: 0.5rem 1rem;
      border-radius: 60px;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      border: 1px solid #dcc2ae;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
      animation: popIn 0.3s ease;
      transition: 0.2s;
    }

    .file-preview i {
      color: #8f684a;
      font-size: 1rem;
    }

    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* ----- action buttons : with hover & glow animation ----- */
    .actions {
      display: flex;
      gap: 1.2rem;
      flex-wrap: wrap;
      margin-top: 0.8rem;
    }

    .btn {
      flex: 1 1 auto;
      min-width: 140px;
      padding: 0.9rem 1.6rem;
      border: none;
      border-radius: 60px;
      background: #e3cfbe;
      color: #2f241b;
      font-weight: 600;
      font-size: 1rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.7rem;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 10px rgba(150, 110, 70, 0.05);
      border: 1px solid rgba(255, 235, 215, 0.6);
      backdrop-filter: blur(4px);
      background: rgba(220, 200, 180, 0.5);
      letter-spacing: 0.3px;
    }

    .btn i {
      font-size: 1.1rem;
      transition: 0.2s;
    }

    .btn-primary {
      background: #b6845e;
      border: 1px solid #dbb08c;
      color: #fef7ef;
      box-shadow: 0 8px 16px -6px rgba(150, 90, 50, 0.25);
    }

    .btn-primary i {
      color: #faeedc;
    }

    .btn-primary:hover {
      background: #a4714b;
      transform: scale(1.02) translateY(-3px);
      box-shadow: 0 16px 28px -8px rgba(140, 80, 40, 0.35);
      border-color: #ca9b78;
    }

    .btn-primary:hover i {
      animation: iconShake 0.5s ease;
    }

    @keyframes iconShake {
      0% { transform: rotate(0); }
      25% { transform: rotate(6deg); }
      75% { transform: rotate(-6deg); }
      100% { transform: rotate(0); }
    }

    .btn-secondary {
      background: rgba(235, 215, 195, 0.6);
      border: 1px solid #dac2ae;
      color: #3f3023;
    }

    .btn-secondary:hover {
      background: #dcc2ae;
      transform: translateY(-2px);
      box-shadow: 0 10px 18px -6px rgba(120, 80, 50, 0.15);
      border-color: #be9f87;
    }

    .btn-secondary:hover i {
      transform: translateX(4px) scale(1.1);
    }

    /* ----- extra magic : animated decorative dots ----- */
    .story-footer {
      margin-top: 2.2rem;
      display: flex;
      justify-content: flex-end;
      gap: 0.4rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: #c8ad95;
      border-radius: 60px;
      display: inline-block;
      animation: dotWave 1.8s infinite alternate ease-in-out;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; background: #b58b6f; }
    .dot:nth-child(3) { animation-delay: 0.4s; background: #a07658; }
    .dot:nth-child(4) { animation-delay: 0.6s; background: #936a4d; }
    .dot:nth-child(5) { animation-delay: 0.8s; background: #815f44; }

    @keyframes dotWave {
      0% { transform: translateY(0px) scale(0.8); opacity: 0.3; }
      100% { transform: translateY(-6px) scale(1.2); opacity: 1; }
    }

    /* ----- responsive touches ----- */
    @media (max-width: 550px) {
      .story-card {
        padding: 1.8rem 1.2rem;
        border-radius: 32px;
      }
      .story-header h1 {
        font-size: 1.4rem;
      }
      .actions {
        flex-direction: column;
      }
      .btn {
        min-width: 100%;
      }
      .drop-zone {
        padding: 1.8rem 1rem;
      }
    }

    /* custom image preview icon (small) */
    .fake-preview {
      display: none;
    }
  </style>
</head>
<body>
  <div class="story-card">

    <!-- HEADER with animated icon & badge -->
    <div class="story-header">
      <i class="fas fa-feather-alt"></i>
      <h1>story · create</h1>
      <span><i class="far fa-clock" style="margin-right: 6px;"></i> new</span>
    </div>

    <form enctype="multipart/form-data" method="post" >
    {% csrf_token %}

    <!-- CAPTION field -->
    <div class="caption-field">
      <label for="captionInput">
        <i class="fas fa-quote-right"></i> Caption
      </label>
      <input type="text"  placeholder="Write your story caption..." name="story_caption" />
      <i class="fas fa-pen-fancy input-icon"></i>
    </div>

    <!-- IMAGE UPLOAD field -->
    <div class="image-upload">
      <label for="imageUpload">
        <i class="fas fa-image"></i> Image
      </label>
      <div class="drop-zone" id="dropZone">
        <i class="fas fa-cloud-upload-alt"></i>
        <p><strong>Drop</strong> your image here or <u>browse</u></p>
        <div class="file-hint">
          <i class="fas fa-info-circle"></i> PNG, JPG, WEBP
        </div>
        <input type="file"  accept="image/*" name="story_image"/>
      </div>
      <!-- dynamic file preview (shows after selection) -->
      <div id="filePreviewContainer" style="margin-top: 12px; min-height: 30px;"></div>
    </div>

    <!-- ACTION BUTTONS with animations -->
    <div class="actions">
      <button class="btn btn-primary" id="publishBtn">
        <i class="fas fa-paper-plane"></i> Publish story
      </button>
      <button class="btn btn-secondary" id="resetBtn">
        <i class="fas fa-undo-alt"></i> Reset
      </button>
    </div>
    </form>

    <!-- footer decorative dots (animation) -->
    <div class="story-footer">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
  </div>

  <script>
    (function() {
      // ----- DOM elements -----
      const fileInput = document.getElementById('imageUpload');
      const previewContainer = document.getElementById('filePreviewContainer');
      const captionInput = document.getElementById('captionInput');
      const publishBtn = document.getElementById('publishBtn');
      const resetBtn = document.getElementById('resetBtn');
      const dropZone = document.getElementById('dropZone');

      // ----- helper: update file preview with animation -----
      function updateFilePreview(file) {
        if (file) {
          const fileName = file.name;
          const fileSize = (file.size / 1024).toFixed(1);
          previewContainer.innerHTML = `
            <div class="file-preview">
              <i class="fas fa-check-circle" style="color: #7f9f6b;"></i>
              <span><strong>${fileName}</strong>  ·  ${fileSize} KB</span>
              <i class="fas fa-times-circle" style="margin-left: 6px; color: #a0684a; cursor: pointer;" id="removeFileBtn"></i>
            </div>
          `;
          // remove file handler
          document.getElementById('removeFileBtn').addEventListener('click', function(e) {
            e.stopPropagation();
            fileInput.value = '';
            previewContainer.innerHTML = '';
            // reset dropzone look (optional)
            dropZone.style.borderColor = '#cfb6a2';
          });
          // subtle border change
          dropZone.style.borderColor = '#9f7f64';
        } else {
          previewContainer.innerHTML = '';
          dropZone.style.borderColor = '#cfb6a2';
        }
      }

      // ----- file input change -----
      fileInput.addEventListener('change', function(e) {
        const file = this.files[0];
        if (file) {
          updateFilePreview(file);
        } else {
          previewContainer.innerHTML = '';
        }
      });

      // ----- drag & drop visual (optional) -----
      dropZone.addEventListener('dragover', function(e) {
        e.preventDefault();
        this.style.background = 'rgba(225, 200, 175, 0.5)';
        this.style.borderColor = '#b8865f';
      });
      dropZone.addEventListener('dragleave', function(e) {
        e.preventDefault();
        this.style.background = 'rgba(245, 232, 220, 0.4)';
        this.style.borderColor = '#cfb6a2';
      });
      dropZone.addEventListener('drop', function(e) {
        e.preventDefault();
        this.style.background = 'rgba(245, 232, 220, 0.4)';
        this.style.borderColor = '#cfb6a2';
        const files = e.dataTransfer.files;
        if (files.length > 0) {
          fileInput.files = files;
          updateFilePreview(files[0]);
        }
      });

      // ----- reset button : clear caption & image -----
      resetBtn.addEventListener('click', function() {
        captionInput.value = '';
        fileInput.value = '';
        previewContainer.innerHTML = '';
        dropZone.style.borderColor = '#cfb6a2';
        // optional focus
        captionInput.focus();
      });

      // ----- publish button: toast-like feedback (animated) -----
      publishBtn.addEventListener('click', function() {
        const caption = captionInput.value.trim() || '(no caption)';
        const file = fileInput.files[0];
        const fileName = file ? file.name : '📎 no image selected';
        // create a temporary feedback message (with animation)
        const toast = document.createElement('div');
        toast.style.position = 'fixed';
        toast.style.bottom = '30px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.background = '#2d241e';
        toast.style.color = '#f5ede6';
        toast.style.padding = '1rem 2.2rem';
        toast.style.borderRadius = '80px';
        toast.style.fontWeight = '500';
        toast.style.boxShadow = '0 20px 40px -10px rgba(0,0,0,0.4), 0 0 0 1px #ba9a82 inset';
        toast.style.backdropFilter = 'blur(10px)';
        toast.style.background = 'rgba(40, 30, 24, 0.85)';
        toast.style.zIndex = '999';
        toast.style.fontSize = '1rem';
        toast.style.letterSpacing = '0.2px';
        toast.style.border = '1px solid #bfa187';
        toast.innerHTML = `
          <i class="fas fa-check-circle" style="color: #b6c7a3; margin-right: 12px;"></i>
          story ready · “${caption}” · ${fileName}
        `;
        document.body.appendChild(toast);

        // animate in
        toast.style.animation = 'floatIn 0.4s ease';
        // auto remove after 3.5s
        setTimeout(() => {
          toast.style.transition = 'opacity 0.3s, transform 0.3s';
          toast.style.opacity = '0';
          toast.style.transform = 'translateX(-50%) translateY(20px)';
          setTimeout(() => {
            if (toast.parentNode) toast.remove();
          }, 350);
        }, 3000);
      });

      // ----- extra: if user clicks on drop zone, trigger file input (already does) -----

      // small initial preview if there's a file from default ? (none)
      // but we set a default caption only.
    })();
  </script>
</body>
</html>
