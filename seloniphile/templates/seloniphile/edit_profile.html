{% load static %}
<html lang="en">

<head>
<script>document.documentElement.setAttribute("data-theme", localStorage.getItem("velora-theme") || "dark");</script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velora — Edit Profile</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="{% static 'css/userpanel.css' %}">
</head>

<body>

  <!-- ✅ SIDEBAR -->
  <nav class="sidebar">
    <div class="logo">Kit<span>nagram</span></div>

    <div class="nav-links">
      <a href="{% url 'home' %}"          class="nav-item"><span class="nav-icon"><i class="fa-solid fa-house"></i></span><span class="nav-label">Home</span></a>
    <a href="{% url 'search' %}"        class="nav-item"><span class="nav-icon"><i class="fa-solid fa-magnifying-glass"></i></span><span class="nav-label">Search</span></a>
    <a href="{% url 'explore' %}"       class="nav-item"><span class="nav-icon"><i class="fa-solid fa-compass"></i></span><span class="nav-label">Explore</span></a>
    <a href="{% url 'reels' %}"         class="nav-item"><span class="nav-icon"><i class="fa-solid fa-film"></i></span><span class="nav-label">Reels</span></a>
    <a href="{% url 'messages' %}"      class="nav-item has-badge"><span class="nav-icon"><i class="fa-solid fa-paper-plane"></i></span><span class="nav-label">Messages</span><span class="badge">4</span></a>
    <a href="{% url 'notifications' %}" class="nav-item has-badge"><span class="nav-icon"><i class="fa-solid fa-bell"></i></span><span class="nav-label">Notifications</span><span class="badge red">7</span></a>
    <a href="{% url 'followers' %}"     class="nav-item"><span class="nav-icon"><i class="fa-solid fa-user-group"></i></span><span class="nav-label">Followers</span></a>
    <a href="{% url 'following' %}"     class="nav-item"><span class="nav-icon"><i class="fa-solid fa-user-check"></i></span><span class="nav-label">Following</span></a>
    <a href="{% url 'reel_create' %}"        class="nav-item"><span class="nav-icon"><i class="fa-regular fa-square-plus"></i></span><span class="nav-label">Create Reel</span></a>
    <a href="{% url 'create' %}"        class="nav-item"><span class="nav-icon"><i class="fa-regular fa-square-plus"></i></span><span class="nav-label">Create</span></a>
    <a href="{% url 'profile' %}"class="sidebar-profile-mini">
        <span class="nav-icon">
          
        <img src="{{uid.profile_pic.url}}" alt="Profile">
                </span>
        <span class="nav-label">Profile</span>
      </a>
    </div>
    <div class="sidebar-divider"></div>
    <div class="nav-bottom">
      <a href="{% url 'settings' %}" class="nav-item"><i class="fa-solid fa-gear"></i> Settings</a>
      <a href="{% url 'login' %}" class="nav-item logout-btn">
        <i class="fa-solid fa-right-from-bracket"></i> Logout
      </a>
    </div>
  </nav>

  <!-- ✅ MAIN WRAPPER -->
  <div class="pages-wrapper">

    <div class="page page-full" style="display:flex; justify-content:center; width:100%;">

      <div class="page-content narrow" style="margin:0 auto;">

        <!-- FORM -->
        <form method="post" enctype="multipart/form-data" action="{% url 'edit_profile' %}">
        {% csrf_token %} 
          <div class="page-header-row">
            <a href="{% url 'profile' %}" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
            <div class="page-header" style="margin-bottom:0">
              <i class="fa-solid fa-pen"></i> Edit Profile
            </div>
          </div>

          <div class="edit-profile-card">

            <!-- IMAGE -->
            <div class="edit-av-section">
              <div class="edit-av-wrap">
                <img src="{{uid.profile_pic.url}}" class="edit-av" alt="aria.velora">
                
                                <label class="edit-av-btn">
                  <i class="fa-solid fa-camera"></i>
                  <input type="file" style="display:none" name="profile_pic">
                </label>
              </div>

              <div class="edit-av-info">
                <div class="edit-av-name">{{uid.username}}</div>
              </div>
            </div>

            <div class="edit-divider"></div>

            <!-- FORM -->
            <div class="edit-form">

              <div class="edit-form-row">
                <div class="form-group">
                  <label class="form-label">Full Name</label>
                  <input class="form-input" value="{{uid.name}}" name="name" required>
                </div>

                <div class="form-group">
                  <label class="form-label">Username</label>
                  <div class="form-input-icon">
                    <span class="input-prefix">@</span>
                    <input class="form-input prefix-input" value="{{uid.username}}" name="username" required>
                  </div>
                </div>
              </div>

              <div class="form-group">
                <label class="form-label">Bio</label>
                <input class="form-input" value="{{uid.bio}}" name="bio">
              </div>

              <div class="edit-form-row">
                <div class="form-group">
                  <label class="form-label">Link</label>
                  <input class="form-input" value="{{uid.link}}" name="link">
                </div>

                <div class="form-group">
                  <label class="form-label">Description</label>
                  <input class="form-input" value="{{uid.description}}" name="description">
                </div>
              </div>

              <!-- BUTTON -->
              <div class="edit-form-actions">
                <a href="{% url 'profile' %}" class="cancel-btn">Cancel</a>
                <button type="submit" class="publish-btn">
                  <i class="fa-solid fa-check"></i> Save Changes
                </button>
              </div>
            </div>
          </div>

        </form>

      </div>
    </div>
  </div>


<button class="theme-toggle" id="themeToggle" title="Toggle theme"><i class="fa-solid fa-moon" id="themeIcon"></i></button>

<script>
(function() {
  var saved = localStorage.getItem('velora-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  updateIcon(saved);
  function updateIcon(t) {
    var ic = document.getElementById('themeIcon');
    if (ic) ic.className = t === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
  }
  window.addEventListener('DOMContentLoaded', function() {
    var btn = document.getElementById('themeToggle');
    if (btn) btn.addEventListener('click', function() {
      var cur = document.documentElement.getAttribute('data-theme');
      var next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('velora-theme', next);
      updateIcon(next);
    });
  });
})();
</script>
</body>

</html>
