{% load static %}
<html lang="en">
<head>
<script>document.documentElement.setAttribute("data-theme", localStorage.getItem("velora-theme") || "dark");</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitnagrame — Log In</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
<link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>

<div class="page">

  <!-- Logo -->
  

  <!-- Card -->
  <div class="card">
    <div class="card-logo"><center>Kit<span>nagram</span></center></div>
    <div class="card-head">   
    </div>

    
      <form class="form" action="{% url 'login' %}" method="post">
      {% csrf_token %}
      {% if e_msg %}
        <div class="alert alert-danger" role="alert">
          {{e_msg}}
        </div>
        {% endif %}
      <div class="field">
        <label class="label">Email</label>
        <div class="input-wrap">
          <i class="fa-solid fa-envelope inp-icon"></i>
          <input type="text" class="input" placeholder="Enter Your Email" autocomplete="username" name="email">
        </div>
      </div>

      <div class="field">
        <div class="label-row">
          <label class="label">Password</label>
        </div>
        <div class="input-wrap">
          <i class="fa-solid fa-lock inp-icon"></i>
          <input type="password" class="input" placeholder="Enter your password" id="pw" autocomplete="current-password" name="password">
          <button type="button" class="eye" onclick="toggle('pw',this)"><i class="fa-regular fa-eye"></i></button>
        </div>
      </div>
      
      <button type="submit" class="btn">
        <i class="fa-solid fa-right-to-bracket"></i> Log In
      </button>

    </form>


    <p class="switch">Don't have an account? 
      <a href="{% url 'register' %}" style="text-decoration: none;">Sign up →</a><br>
      <a href="#" class="forgot">Forgot password?</a>
    </p>
    

  </div>

</div>

<script>
  function toggle(id, btn) {
    const inp = document.getElementById(id);
    const ic = btn.querySelector('i');
    inp.type = inp.type === 'password' ? 'text' : 'password';
    ic.className = inp.type === 'password' ? 'fa-regular fa-eye' : 'fa-regular fa-eye-slash';
  }
</script>

<button class="theme-toggle" id="themeToggle" title="Toggle theme"><i class="fa-solid fa-moon" id="themeIcon"></i></button>

<script>
(function() {
  var saved = localStorage.getItem('velora-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  updateIcon(saved);
  function updateIcon(t) {
    var ic = document.getElementById('themeIcon');
    if (ic) ic.className = t === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
  }
  window.addEventListener('DOMContentLoaded', function() {
    var btn = document.getElementById('themeToggle');
    if (btn) btn.addEventListener('click', function() {
      var cur = document.documentElement.getAttribute('data-theme');
      var next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('velora-theme', next);
      updateIcon(next);
    });
  });
})();
</script>
</body>
</html>
