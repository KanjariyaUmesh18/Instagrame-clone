{% load static %}
<html lang="en">
<head>
<script>document.documentElement.setAttribute("data-theme", localStorage.getItem("velora-theme") || "dark");</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velora — Create Reel</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="{% static 'css/userpanel.css' %}">
<link rel="stylesheet" href="{% static 'css/create.css' %}">

<style>
/* Reel specific styles */
.reel-upload-zone {
    border: 2px dashed var(--border-color, #3a3a3a);
    border-radius: 16px;
    padding: 50px 20px;
    text-align: center;
    background: var(--bg-secondary, #1a1a1a);
    transition: all 0.3s ease;
    min-height: 250px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.reel-upload-zone i {
    font-size: 48px;
    color: var(--accent-color, #ff6b6b);
    margin-bottom: 15px;
}

.reel-upload-zone .upload-text {
    font-size: 18px;
    font-weight: 500;
    color: var(--text-primary, #ffffff);
}

.reel-upload-zone .upload-sub {
    margin: 10px 0;
    color: var(--text-secondary, #888);
}

.reel-upload-zone .upload-formats {
    font-size: 13px;
    color: var(--text-secondary, #888);
    margin-top: 10px;
}

.reel-upload-zone.dragover {
    border-color: var(--accent-color, #ff6b6b);
    background: var(--bg-hover, #2a2a2a);
}

.video-preview-container {
    position: relative;
    width: 100%;
    max-width: 400px;
    margin: 0 auto;
    border-radius: 12px;
    overflow: hidden;
    background: #000;
}

.video-preview-container video {
    width: 100%;
    display: block;
    max-height: 500px;
    object-fit: contain;
}

.remove-video-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(0,0,0,0.7);
    color: white;
    border: none;
    border-radius: 50%;
    width: 36px;
    height: 36px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
}

.remove-video-btn:hover {
    background: rgba(255,0,0,0.8);
    transform: scale(1.1);
}

.reel-upload-zone .video-icon {
    font-size: 60px;
    color: var(--accent-color, #ff6b6b);
    margin-bottom: 15px;
}

.reel-upload-zone .duration-badge {
    display: inline-block;
    background: var(--accent-color, #ff6b6b);
    color: white;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    margin-top: 8px;
}

/* Form Styles */
.form-group {
    margin-bottom: 20px;
}

.form-label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary, #888);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
}

.form-textarea {
    width: 100%;
    padding: 12px 16px;
    background: var(--bg-secondary, #1a1a1a);
    border: 1px solid var(--border-color, #3a3a3a);
    border-radius: 12px;
    color: var(--text-primary, #ffffff);
    font-family: inherit;
    font-size: 14px;
    resize: vertical;
    min-height: 100px;
    transition: border-color 0.2s;
}

.form-textarea:focus {
    outline: none;
    border-color: var(--accent-color, #ff6b6b);
}

.form-input-icon {
    display: flex;
    align-items: center;
    background: var(--bg-secondary, #1a1a1a);
    border: 1px solid var(--border-color, #3a3a3a);
    border-radius: 12px;
    padding: 0 16px;
    transition: border-color 0.2s;
}

.form-input-icon:focus-within {
    border-color: var(--accent-color, #ff6b6b);
}

.form-input-icon i {
    color: var(--text-secondary, #888);
    margin-right: 12px;
}

.form-input {
    width: 100%;
    padding: 12px 0;
    background: transparent;
    border: none;
    color: var(--text-primary, #ffffff);
    font-size: 14px;
}

.form-input:focus {
    outline: none;
}

.create-actions {
    display: flex;
    gap: 12px;
    margin-top: 20px;
}

.cancel-btn {
    flex: 1;
    padding: 12px;
    background: var(--bg-secondary, #1a1a1a);
    border: 1px solid var(--border-color, #3a3a3a);
    border-radius: 12px;
    color: var(--text-secondary, #888);
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
}

.cancel-btn:hover {
    background: var(--bg-hover, #2a2a2a);
}

.publish-btn {
    flex: 2;
    padding: 12px;
    background: var(--accent-color, #ff6b6b);
    border: none;
    border-radius: 12px;
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

.publish-btn:hover {
    opacity: 0.85;
    transform: translateY(-1px);
}

.upload-btn {
    display: inline-block;
    padding: 10px 24px;
    background: var(--accent-color, #ff6b6b);
    color: white;
    border-radius: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
}

.upload-btn:hover {
    opacity: 0.85;
    transform: translateY(-1px);
}

.page-content.narrow {
    max-width: 600px;
    margin: 0 auto;
    padding: 20px;
}

.page-header {
    font-size: 24px;
    font-weight: 700;
    color: var(--text-primary, #ffffff);
    margin-bottom: 30px;
    display: flex;
    align-items: center;
    gap: 12px;
}

.page-header i {
    color: var(--accent-color, #ff6b6b);
}

.nav-item.active {
    background: var(--bg-hover, #2a2a2a);
    color: var(--accent-color, #ff6b6b);
}

.sidebar-profile-mini .nav-icon img {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    object-fit: cover;
}

.create-box {
    background: var(--bg-secondary, #1a1a1a);
    border-radius: 16px;
    padding: 24px;
    border: 1px solid var(--border-color, #3a3a3a);
}

.create-form {
    margin-top: 20px;
}

/* Mobile Responsive */
@media (max-width: 768px) {
    .create-actions {
        flex-direction: column;
    }
    .page-content.narrow {
        padding: 10px;
    }
    .create-box {
        padding: 16px;
    }
}
</style>
</head>
<body>

<!-- ══ LEFT SIDEBAR ══════════════════════════════ -->
<nav class="sidebar">
  <div class="logo">Kit<span>nagram</span></div>
  <div class="nav-links">
    <a href="{% url 'home' %}"          class="nav-item"><span class="nav-icon"><i class="fa-solid fa-house"></i></span><span class="nav-label">Home</span></a>
    <a href="{% url 'search' %}"        class="nav-item"><span class="nav-icon"><i class="fa-solid fa-magnifying-glass"></i></span><span class="nav-label">Search</span></a>
    <a href="{% url 'explore' %}"       class="nav-item"><span class="nav-icon"><i class="fa-solid fa-compass"></i></span><span class="nav-label">Explore</span></a>
    <a href="{% url 'reels' %}"         class="nav-item"><span class="nav-icon"><i class="fa-solid fa-film"></i></span><span class="nav-label">Reels</span></a>
    <a href="{% url 'messages' %}"      class="nav-item has-badge"><span class="nav-icon"><i class="fa-solid fa-paper-plane"></i></span><span class="nav-label">Messages</span><span class="badge">4</span></a>
    <a href="{% url 'notifications' %}" class="nav-item has-badge"><span class="nav-icon"><i class="fa-solid fa-bell"></i></span><span class="nav-label">Notifications</span><span class="badge red">7</span></a>
    <a href="{% url 'followers' %}"     class="nav-item"><span class="nav-icon"><i class="fa-solid fa-user-group"></i></span><span class="nav-label">Followers</span></a>
    <a href="{% url 'following' %}"     class="nav-item"><span class="nav-icon"><i class="fa-solid fa-user-check"></i></span><span class="nav-label">Following</span></a>
    <a href="{% url 'create' %}"        class="nav-item"><span class="nav-icon"><i class="fa-regular fa-square-plus"></i></span><span class="nav-label">Create</span></a>
    <a href="{% url 'reel_create' %}"   class="nav-item active"><span class="nav-icon"><i class="fa-solid fa-video"></i></span><span class="nav-label">Create Reel</span></a>
    <a href="{% url 'profile' %}" class="sidebar-profile-mini">
      <span class="nav-icon">
        <img src="{{uid.profile_pic.url}}" alt="Profile">
      </span>
      <span class="nav-label">Profile</span>
    </a>
  </div>
  <div class="sidebar-divider"></div>
  <div class="nav-bottom">
    <a href="{% url 'settings' %}" class="nav-item"><span class="nav-icon"><i class="fa-solid fa-gear"></i></span><span class="nav-label">Settings</span></a>
    <a href="{% url 'login' %}" class="nav-item logout-btn"><span class="nav-icon"><i class="fa-solid fa-right-from-bracket"></i></span><span class="nav-label">Logout</span></a>
  </div>
</nav>

<!-- ══ ALL PAGES ══════════════════════════════════ -->
<div class="pages-wrapper">

<!-- ── REEL CREATE ─────────────────────────────────── -->
<div id="reel-create" class="page page-full" style="display:block;">
  <div class="page-content narrow">
    <div class="page-header"><i class="fa-solid fa-video"></i> Create Reel</div>
    
    <form method="post" enctype="multipart/form-data" action="{% url 'reel_create' %}">
    {% csrf_token %}
      
      <div class="create-box">
        <!-- Video Upload Zone -->
        <div class="reel-upload-zone">
          <i class="fa-solid fa-video video-icon"></i>
          <div class="upload-text">Drag &amp; drop your video here</div>
          <div class="upload-sub">or</div>
          <label class="upload-btn">Browse Files
            <input type="file" style="display:none" accept="video/*" name="video" required>
          </label>
          <div class="upload-formats">MP4, MOV, AVI · Max 100MB</div>
          <div class="duration-badge">Max 90 seconds</div>
        </div>

        <div class="create-form">
          <!-- Caption Field -->
          <div class="form-group">
            <label class="form-label">Caption</label>
            <textarea class="form-textarea" placeholder="Write a caption… use # for tags, @ for mentions" rows="4" name="caption"></textarea>
          </div>

          <!-- Location Field -->
          <div class="form-group">
            <label class="form-label">Location</label>
            <div class="form-input-icon">
              <i class="fa-solid fa-location-dot"></i>
              <input type="text" class="form-input" placeholder="Add location" name="location">
            </div>
          </div>

          <!-- Actions -->
          <div class="create-actions">
            <!-- <button type="button" class="cancel-btn" href="{% url 'reel_create' %}">Discard</button> -->
            <button type="submit" class="publish-btn">
                <i class="fa-solid fa-paper-plane"></i>
                Share Reel
            </button>
          </div>
        </div>
      </div>
    </form>
  </div>
</div>

</div><!-- /pages-wrapper -->

<button class="theme-toggle" id="themeToggle" title="Toggle theme">
  <i class="fa-solid fa-moon" id="themeIcon"></i>
</button>

<!-- Only Theme Toggle JavaScript remains -->
<script>
(function() {
  var saved = localStorage.getItem('velora-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  updateIcon(saved);
  
  function updateIcon(t) {
    var ic = document.getElementById('themeIcon');
    if (ic) ic.className = t === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
  }
  
  window.addEventListener('DOMContentLoaded', function() {
    var btn = document.getElementById('themeToggle');
    if (btn) btn.addEventListener('click', function() {
      var cur = document.documentElement.getAttribute('data-theme');
      var next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('velora-theme', next);
      updateIcon(next);
    });
  });
})();
</script>

</body>
</html>
