{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>✨ Kitnagram — Story</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ----- RESET & BASE ----- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 1rem;
            overflow: hidden;
        }

        /* ----- STORY CONTAINER ----- */
        .story-container {
            width: 100%;
            max-width: 420px;
            aspect-ratio: 9 / 16;
            background: #1a120e;
            border-radius: 28px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(227, 207, 190, 0.15);
            animation: containerPop 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes containerPop {
            0% { opacity: 0; transform: scale(0.92) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* ----- STORY BACKGROUND / IMAGE ----- */
        .story-slide {
            width: 100%; height: 100%;
            position: relative;
            background: linear-gradient(145deg, #2a1f18, #1a1210);
            display: flex; align-items: center; justify-content: center;
        }

        .story-slide img {
            width: 100%; height: 100%;
            object-fit: contain;
            display: block; position: absolute; top: 0; left: 0;
            background: #000;
        }

        /* gradient overlay */
        .story-slide::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 50%;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.85) 0%, transparent 100%);
            pointer-events: none;
        }
        .story-slide::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 120px;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.6) 0%, transparent 100%);
            pointer-events: none; z-index: 10;
        }

        /* ----- PROGRESS BAR ----- */
        .progress-bar-container {
            position: absolute; top: 12px; left: 12px; right: 12px;
            display: flex; gap: 4px; z-index: 20;
        }
        .progress-segment {
            flex: 1; height: 3px; background: rgba(255, 255, 255, 0.25);
            border-radius: 4px; overflow: hidden;
        }
        .progress-segment .fill {
            height: 100%; width: 0%;
            background: #fdf6e3;
            border-radius: 4px;
            animation: progressAnim 5s linear forwards;
        }

        .progress-segment:nth-child(1) .fill { animation-delay: 0s; width: 100%; }
        .progress-segment:nth-child(2) .fill { animation-delay: 5s; width: 0%; }
        .progress-segment:nth-child(3) .fill { animation-delay: 10s; width: 0%; }
        .progress-segment:nth-child(4) .fill { animation-delay: 15s; width: 0%; }
        .progress-segment:nth-child(5) .fill { animation-delay: 20s; width: 0%; }

        @keyframes progressAnim {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        /* ----- HEADER ----- */
        .story-header {
            position: absolute; top: 24px; left: 16px; right: 16px;
            display: flex; align-items: center; gap: 12px;
            z-index: 15; pointer-events: none;
        }
        .story-header .avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: linear-gradient(135deg, #5b3f2b, #b6845e);
            padding: 2px; flex-shrink: 0;
        }
        .story-header .avatar img {
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
            border: 2px solid #1a120e;
        }
        .story-header .user-info {
            color: #fffaf5; font-size: 0.85rem; font-weight: 500;
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.6);
            display: flex; flex-direction: column; gap: 1px;
        }
        .story-header .user-info .username { font-weight: 600; font-size: 0.9rem; letter-spacing: 0.2px; }
        .story-header .user-info .timestamp { font-size: 0.65rem; opacity: 0.8; font-weight: 400; color: #dcc9b6; }
        .story-header .more-btn {
            margin-left: auto; color: white; font-size: 1.2rem; opacity: 0.8;
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.6);
            pointer-events: auto; cursor: pointer; transition: 0.2s;
        }
        .story-header .more-btn:hover { opacity: 1; transform: scale(1.1); color: #e3cfbe; }

        /* ----- CAPTION ----- */
        .story-caption {
            position: absolute; bottom: 80px; left: 20px; right: 20px;
            z-index: 15; color: white; font-size: 0.95rem; line-height: 1.5;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
            display: flex; align-items: flex-start; gap: 10px;
            animation: captionSlide 0.6s ease;
        }
        @keyframes captionSlide {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .story-caption i { margin-top: 2px; font-size: 0.8rem; color: #b6845e; }
        .story-caption .caption-text { font-weight: 400; letter-spacing: 0.2px; word-break: break-word; color: #fffaf5; }
        .story-caption .caption-text .hashtag { color: #dcc9b6; font-weight: 500; }

        /* ----- REPLY ----- */
        .story-actions {
            position: absolute; bottom: 24px; left: 16px; right: 16px;
            display: flex; gap: 10px; z-index: 15;
            animation: actionSlide 0.8s ease;
        }
        @keyframes actionSlide {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .story-actions input {
            flex: 1; padding: 10px 16px; border-radius: 60px; border: none;
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(8px);
            color: white; font-size: 0.85rem; outline: none; transition: all 0.2s;
            border: 1px solid rgba(227, 207, 190, 0.3); font-family: inherit;
        }
        .story-actions input::placeholder { color: rgba(255, 250, 240, 0.6); }
        .story-actions input:focus { background: rgba(255, 250, 240, 0.25); border-color: rgba(227, 207, 190, 0.5); }
        .story-actions .action-btn {
            background: none; border: none; color: white; font-size: 1.4rem; cursor: pointer;
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; transition: 0.2s;
            text-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }
        .story-actions .action-btn:hover { transform: scale(1.1) rotate(10deg); color: #b6845e; }
        .story-actions .like-btn:hover { color: #e11d48; }

        /* ----- NAVIGATION ----- */
        .nav-tap { position: absolute; top: 0; bottom: 0; width: 30%; z-index: 25; cursor: pointer; }
        .nav-tap.left { left: 0; }
        .nav-tap.right { right: 0; width: 70%; }

        /* ----- CLOSE BTN ----- */
        .close-story {
            position: fixed; top: 20px; right: 24px;
            color: rgba(255,255,255,0.8); font-size: 1.8rem;
            cursor: pointer; z-index: 50; transition: 0.2s;
            text-decoration: none;
        }
        .close-story:hover { transform: scale(1.1); color: #fff; }
    </style>
</head>
<body>

    <a href="{% url 'home' %}" class="close-story"><i class="fa-solid fa-xmark"></i></a>

    <div class="story-container">
        
        {% for s in v_story %} 
        <div class="progress-bar-container">
            <div class="progress-segment"><div class="fill"></div></div>
            <div class="progress-segment"><div class="fill"></div></div>
        </div>

        <div class="story-header">
            <div class="avatar">
                <img src="{{s.user.profile_pic.url}}" alt="User" />
            </div>
            <div class="user-info">
                <span class="username">{{s.user.username}}</span>
                <span class="timestamp">{{s.whenpublished}}</span>
            </div>
            <i class="fa-solid fa-ellipsis more-btn"></i>
        </div>

        <div class="story-slide">
            <img src="{{s.story_image.url}}" alt="Story content" />
        </div>

        {% if s.story_caption %}
        <div class="story-caption">
            <i class="fa-solid fa-quote-left"></i>
            <span class="caption-text">{{s.story_caption}}</span>
        </div>
        {% endif %}
        {% endfor %}

        <div class="story-actions">
            <input type="text" placeholder="Send message..." />
            <button class="action-btn like-btn"><i class="fa-regular fa-heart"></i></button>
            <button class="action-btn"><i class="fa-regular fa-paper-plane"></i></button>
        </div>

        <div class="nav-tap left"></div>
        <div class="nav-tap right"></div>
    </div>

</body>
</html>
